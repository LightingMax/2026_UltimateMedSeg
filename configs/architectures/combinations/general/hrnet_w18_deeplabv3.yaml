# Architecture combination: encoder=hrnet_w18 + decoder=deeplabv3
# 架构组合：编码器=hrnet_w18 + 解码器=deeplabv3

model:
  num_classes: 2
  img_size: 256
  encoder:
    name: hrnet_w18
    pretrained: false
    in_channels: 3
    params: {}
  skip_connection:
    name: none
    params: {}
  decoder:
    name: deeplabv3
    params: {}
  bottleneck:
    name: none
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
